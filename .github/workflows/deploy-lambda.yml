name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - 'api/lambda/**'

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        function:
          - { name: upload, function_name: ephemeral-upload   }
          - { name: view,   function_name: ephemeral-view     }
          - { name: delete, function_name: filedeadrop-delete }

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Package ${{ matrix.function.name }}
        run: zip -j ${{ matrix.function.name }}.zip api/lambda/${{ matrix.function.name }}/index.mjs

      - name: Deploy ${{ matrix.function.name }}
        run: |
          aws lambda update-function-code \
            --function-name ${{ matrix.function.function_name }} \
            --zip-file fileb://${{ matrix.function.name }}.zip
